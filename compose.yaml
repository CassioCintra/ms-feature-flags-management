services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=ms-feature-flags-management'
      - 'POSTGRES_PASSWORD=very-secret-password'
      - 'POSTGRES_USER=my-user'
    ports:
      - '5432:5432'

  kafka:
    image: 'apache/kafka:4.0.2'
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - '9092:9092'

  keycloak:
    image: 'keycloak/keycloak:26.6'
    command: start-dev
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/ms-feature-flags-management
      - KC_DB_USERNAME=my-user
      - KC_DB_PASSWORD=very-secret-password
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HTTP_PORT=8080
    ports:
      - '8080:8080'
    depends_on:
      - postgres