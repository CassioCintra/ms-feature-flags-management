spring:
  application:
    name: ms-feature-flags-management
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_feature_flags_management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/ms-feature-flags-management
  kafka:
    bootstrap-servers: localhost:9092

feature-flag:
  kafka:
    topic: feature-flags.events

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlator}] %-5level %logger{36} - %msg%n"
  level:
    cassio.featureflags: DEBUG

server:
  port: 8081
  servlet:
    context-path: /feature-flag/v1